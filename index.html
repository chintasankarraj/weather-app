<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SkyCast | Weather Dashboard</title>

    <link rel="stylesheet" href="newstyle.css">
</head>

<body>

<div class="container">

    <div class="top-bar">

        <input
            id="city"
            type="text"
            placeholder="Search city..."
        >

        <button
            id="searchBtn"
            title="Search Weather">
            Get Weather
        </button>

        <button
            id="locationBtn"
            title="Current Location">
            📍
        </button>

        <button
            id="themeBtn"
            title="Toggle Theme">
            🌙
        </button>

    </div>

    <div id="loader">

        <div class="spinner"></div>

        <p>Loading weather...</p>

    </div>

    <h2 id="cityName"></h2>

<div class="dashboard">

    <!-- Left Side -->
    <div class="left-panel">

        <div class="text-blur">
            <div id="current"></div>
        </div>

    </div>

    <!-- Right Side -->
    <div class="right-panel">

        <div class="text-blur">

            <div class="chart-title">
                🌡 Temperature Trend
            </div>

            <div class="chart-container">
                <canvas id="tempChart"></canvas>
            </div>

        </div>

    </div>

</div>

<div class="forecast-section">

    <h3>📅 5-Day Forecast</h3>

    <div id="forecast"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="newapp.js"></script>

</body>

</html>
